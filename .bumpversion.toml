[tool.bumpversion]
current_version = "0.1.0"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]
allow_dirty = false
commit = true
tag = true
tag_name = "v{new_version}"
commit_message = "Bump version: {current_version} → {new_version}"

[[tool.bumpversion.files]]
filename = "package.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[[tool.bumpversion.files]]
filename = "package-lock.json"
search = '"version": "{current_version}"'
replace = '"version": "{new_version}"'

[[tool.bumpversion.files]]
filename = "CHANGELOG.md"
search = "## [Unreleased]"
replace = """## [Unreleased]

## [{new_version}] - {now:%Y-%m-%d}"""

[[tool.bumpversion.files]]
filename = "CHANGELOG.md"
search = "[Unreleased]: https://github.com/thomas-villani/FirstPersonFrog/compare/v{current_version}...HEAD"
replace = """[Unreleased]: https://github.com/thomas-villani/FirstPersonFrog/compare/v{new_version}...HEAD
[{new_version}]: https://github.com/thomas-villani/FirstPersonFrog/compare/v{current_version}...v{new_version}"""
