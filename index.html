<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FROGGER: ROAD VIEW</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: monospace;
        color: #fff;
      }
      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-size: 2rem;
        letter-spacing: 0.15em;
        cursor: pointer;
        user-select: none;
        z-index: 10;
      }
      #overlay small {
        display: block;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        opacity: 0.75;
      }
      #overlay.hidden {
        display: none;
      }
      #hud {
        position: fixed;
        top: 0.75rem;
        right: 1rem;
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
        text-align: right;
        line-height: 1.4;
      }
      #hud .row-score {
        font-size: 1.2rem;
        letter-spacing: 0.15em;
        color: #fff;
      }
      #hud .row-hi {
        opacity: 0.85;
        color: #ffd86b;
      }
      #hud .row-combo {
        font-weight: bold;
        color: #ffae42;
        text-shadow: 0 0 8px #ff8000, 0 0 4px #000;
      }
      #hud .row-nearmiss {
        opacity: 0.7;
        font-size: 0.8rem;
        color: #b8e0ff;
      }
      #lives {
        position: fixed;
        top: 0.75rem;
        left: 1rem;
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
      }
      #lives .label {
        font-size: 0.85rem;
        letter-spacing: 0.15em;
        opacity: 0.85;
        margin-right: 0.4rem;
      }
      #level {
        position: fixed;
        top: 0.75rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.9rem;
        letter-spacing: 0.2em;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
      }
      #toast {
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 3rem;
        letter-spacing: 0.2em;
        color: #8fff8f;
        text-shadow: 0 0 12px #000, 0 0 4px #000;
        opacity: 0;
        transition: opacity 200ms ease-out;
        pointer-events: none;
        z-index: 6;
      }
      #milestone-toast {
        position: fixed;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.8rem;
        letter-spacing: 0.15em;
        color: #ffd86b;
        text-shadow: 0 0 12px #000, 0 0 4px #000;
        opacity: 0;
        transition: opacity 200ms ease-out;
        pointer-events: none;
        z-index: 6;
      }
      #flash {
        position: fixed;
        inset: 0;
        background: #ff2222;
        opacity: 0;
        pointer-events: none;
        transition: opacity 250ms ease-out;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="flash"></div>
    <div id="lives"><span class="label">LIVES</span><span id="lives-icons"></span></div>
    <div id="hud">
      <div class="row-score">SCORE: <span id="score">0</span></div>
      <div class="row-hi">HI: <span id="high-score">0</span></div>
      <div class="row-combo" id="combo-row" style="display:none;">COMBO: <span id="combo">x1</span></div>
      <div class="row-nearmiss">NEAR-MISSES: <span id="near-miss-count">0</span></div>
    </div>
    <div id="level">LEVEL 1</div>
    <div id="toast"></div>
    <div id="milestone-toast"></div>
    <div id="overlay">
      <div>CLICK TO PLAY</div>
      <small>WASD / arrow keys to hop · mouse to look · ESC to pause</small>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
